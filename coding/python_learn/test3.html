<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>贪吃蛇 - HTML版</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #111;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: Arial, sans-serif;
      color: #0f0;
    }
    h1 {
      margin: 10px;
      color: #0f0;
      text-shadow: 0 0 10px #0f0;
    }
    #score {
      font-size: 1.4em;
      margin: 8px;
    }
    #game-board {
      background: #000;
      border: 3px solid #0f0;
      box-shadow: 0 0 20px #0f0;
    }
    #message {
      position: absolute;
      font-size: 2.5em;
      color: #f44;
      text-shadow: 0 0 15px #f00;
      pointer-events: none;
      display: none;
    }
    button {
      margin-top: 15px;
      padding: 10px 30px;
      font-size: 1.2em;
      background: #0a0;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      box-shadow: 0 0 10px #0f0;
    }
    button:hover {
      background: #0f0;
      box-shadow: 0 0 20px #0f0;
    }
  </style>
</head>
<body>

  <h1>贪吃蛇</h1>
  <div id="score">分数: 0</div>
  <canvas id="game-board" width="400" height="400"></canvas>
  <div id="message">游戏结束！</div>
  <button id="restart" style="display:none;">再玩一次</button>

  <script>
    const canvas = document.getElementById('game-board');
    const ctx = canvas.getContext('2d');
    const scoreDisplay = document.getElementById('score');
    const message = document.getElementById('message');
    const restartBtn = document.getElementById('restart');

    const GRID_SIZE = 20;
    const TILE_COUNT = canvas.width / GRID_SIZE;

    let snake = [{ x: 10, y: 10 }];
    let food = { x: 15, y: 15 };
    let dx = 1;
    let dy = 0;
    let score = 0;
    let gameOver = false;
    let speed = 120; // 越小越快

    let gameLoop;

    // 放置新食物（避开蛇身）
    function placeFood() {
      food.x = Math.floor(Math.random() * TILE_COUNT);
      food.y = Math.floor(Math.random() * TILE_COUNT);

      // 如果食物出现在蛇身上，重新生成
      for (let segment of snake) {
        if (segment.x === food.x && segment.y === food.y) {
          placeFood();
          return;
        }
      }
    }

    // 绘制整个画面
    function draw() {
      // 清空画布
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      // 画蛇
      ctx.fillStyle = '#0f0';
      snake.forEach(segment => {
        ctx.fillRect(
          segment.x * GRID_SIZE,
          segment.y * GRID_SIZE,
          GRID_SIZE - 1,
          GRID_SIZE - 1
        );
      });

      // 画食物
      ctx.fillStyle = '#f00';
      ctx.fillRect(
        food.x * GRID_SIZE,
        food.y * GRID_SIZE,
        GRID_SIZE - 1,
        GRID_SIZE - 1
      );
    }

    // 移动蛇
    function move() {
      if (gameOver) return;

      const head = { x: snake[0].x + dx, y: snake[0].y + dy };

      // 撞墙
      if (
        head.x < 0 ||
        head.x >= TILE_COUNT ||
        head.y < 0 ||
        head.y >= TILE_COUNT
      ) {
        endGame();
        return;
      }

      // 撞自己
      for (let segment of snake) {
        if (segment.x === head.x && segment.y === head.y) {
          endGame();
          return;
        }
      }

      snake.unshift(head);

      // 吃到食物
      if (head.x === food.x && head.y === food.y) {
        score += 10;
        scoreDisplay.textContent = `分数: ${score}`;
        placeFood();

        // 加速（可选，每20分加速一次）
        if (score % 50 === 0 && speed > 60) {
          speed -= 10;
          clearInterval(gameLoop);
          gameLoop = setInterval(game, speed);
        }
      } else {
        snake.pop();
      }

      draw();
    }

    function endGame() {
      gameOver = true;
      clearInterval(gameLoop);
      message.style.display = 'block';
      restartBtn.style.display = 'block';
    }

    function resetGame() {
      snake = [{ x: 10, y: 10 }];
      dx = 1;
      dy = 0;
      score = 0;
      speed = 120;
      gameOver = false;
      scoreDisplay.textContent = '分数: 0';
      message.style.display = 'none';
      restartBtn.style.display = 'none';
      placeFood();
      draw();

      clearInterval(gameLoop);
      gameLoop = setInterval(game, speed);
    }

    // 主游戏循环
    function game() {
      move();
    }

    // 键盘控制
    document.addEventListener('keydown', e => {
      if (gameOver) return;

      switch (e.key) {
        case 'ArrowUp':
        case 'w':
        case 'W':
          if (dy === 0) { dx = 0; dy = -1; }
          break;
        case 'ArrowDown':
        case 's':
        case 'S':
          if (dy === 0) { dx = 0; dy = 1; }
          break;
        case 'ArrowLeft':
        case 'a':
        case 'A':
          if (dx === 0) { dx = -1; dy = 0; }
          break;
        case 'ArrowRight':
        case 'd':
        case 'D':
          if (dx === 0) { dx = 1; dy = 0; }
          break;
      }
    });

    // 重新开始按钮
    restartBtn.addEventListener('click', resetGame);

    // 第一次启动
    placeFood();
    draw();
    gameLoop = setInterval(game, speed);
  </script>
</body>
</html>
